services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    command:
      - uv
      - run
      - uvicorn
      - api:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  agent:
    build: .
    env_file:
      - .env
    restart: unless-stopped
